- name: Fix wallpaper for all users
  hosts: windows
  tasks:
    - name: 1. Create wallpaper directory
      win_file:
        path: C:\Wallpaper
        state: directory

    - name: 2. Copy image
      win_copy:
        src: files/background1.jpeg
        dest: C:\Wallpaper\background1.jpeg

    - name: 3. Clear Wallpaper Cache (Before refresh)
      win_shell: |
        $cache = "$env:APPDATA\Microsoft\Windows\Themes\TranscodedWallpaper"
        if (Test-Path $cache) { Remove-Item $cache -Force }
      ignore_errors: yes

    - name: 4. Set Registry for Default and All Active Users
      win_shell: |
        # Для новых юзеров
        $default = "Registry::HKEY_USERS\.DEFAULT\Control Panel\Desktop"
        Set-ItemProperty -Path $default -Name "Wallpaper" -Value "C:\Wallpaper\background1.jpeg"
        
        # Для всех текущих (включая тебя)
        $SIDs = Get-ChildItem Registry::HKEY_USERS | Where-Object { $_.PSChildName -like "S-1-5-21-*" }
        foreach ($SID in $SIDs) {
            $path = "Registry::HKEY_USERS\$($SID.PSChildName)\Control Panel\Desktop"
            if (Test-Path $path) {
                Set-ItemProperty -Path $path -Name "Wallpaper" -Value "C:\Wallpaper\background1.jpeg"
                Set-ItemProperty -Path $path -Name "WallpaperStyle" -Value "10"
            }
        }

    - name: 5. Force Refresh via Win32 API
      win_shell: |
        $code = @'
        using System.Runtime.InteropServices;
        public class Wallpaper {
          [DllImport("user32.dll", CharSet = CharSet.Auto)]
          public static extern int SystemParametersInfo(int uAction, int uParam, string lpvParam, int fuWinIni);
        }
        '@
        Add-Type -TypeDefinition $code
        [Wallpaper]::SystemParametersInfo(0x0014, 0, "C:\Wallpaper\background1.jpeg", 0x01 -bor 0x02)

    - name: 6. Restart Explorer (Nuclear Option)
      win_shell: |
        Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 2
        # Проводник обычно встает сам, но на всякий случай толкаем:
        if (-not (Get-Process explorer -ErrorAction SilentlyContinue)) {
            Start-Process explorer.exe
        }
